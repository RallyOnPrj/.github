name: 리팩터링
description: 구조 개선이나 코드 정리에 사용합니다.
labels:
  - REFACTOR
body:
  - type: markdown
    attributes:
      value: |
        이슈 제목은 제목형 한글 제목으로 작성합니다.
        예: auth origin 판별 로직 정리

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: 작업의 핵심을 짧게 요약해주세요.
      placeholder: "예: 인증 경계 구조를 정리하고 중복 로직을 제거합니다."
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: 배경과 상세 내용을 작성해주세요.
      placeholder: |
        현재 구조의 문제점, 개선 방향, 정리 대상 범위를 작성해주세요.
    validations:
      required: true

  - type: textarea
    id: target
    attributes:
      label: Target
      description: 완료 조건이나 기대 결과를 작성해주세요.
      placeholder: |
        - 책임 분리
        - 테스트 유지
        - 회귀 없는 구조 정리
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: Reference
      description: 관련 이슈, PR, 문서, 설계 링크 등을 작성해주세요.
      placeholder: "예: 관련 PR 링크, 아키텍처 문서"
